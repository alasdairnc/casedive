name: Claude Headless Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Probe claude -p
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "List the files in api/ and report how many there are. Be brief." \
            --allowedTools "Bash(ls:api/)" \
            --max-turns 3 \
            --output-format text
