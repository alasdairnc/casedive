name: Claude Headless Probe

on:
  workflow_dispatch:
    inputs:
      run_probe:
        description: "Run token-consuming Claude probe"
        required: false
        default: false
        type: boolean

concurrency:
  group: claude-headless-probe
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        if: github.event.inputs.run_probe == 'true'

      - uses: actions/setup-node@v4
        if: github.event.inputs.run_probe == 'true'
        with:
          node-version: 24

      - name: Install Claude CLI
        if: github.event.inputs.run_probe == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Probe claude -p
        if: github.event.inputs.run_probe == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "List the files in api/ and report how many there are. Be brief." \
            --allowedTools "Bash(ls:api/)" \
            --max-turns 3 \
            --output-format text

      - name: Skip summary
        if: github.event.inputs.run_probe != 'true'
        run: echo "Skipping probe to avoid token spend. Set run_probe=true to execute."
