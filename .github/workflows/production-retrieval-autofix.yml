name: Production Retrieval Auto-Fix

on:
  schedule:
    - cron: "15 7 * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force run even under low failure volume"
        required: false
        default: "false"
      allow_claude:
        description: "Allow one Claude fallback pass (manual only)"
        required: false
        default: "false"

concurrency:
  group: production-retrieval-autofix
  cancel-in-progress: true

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  detect:
    runs-on: ubuntu-latest
    env:
      PROD_BASE_URL: https://casefinder-project-git-main-alasdairncs-projects.vercel.app
      RETRIEVAL_HEALTH_FALLBACK_BASE_URLS: https://www.casedive.ca,https://casedive.ca
      RETRIEVAL_HEALTH_SOFT_FAIL: "true"
      MIN_FAILURE_EVENTS: "10"
      FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_run || 'false' }}
    outputs:
      run_autofix: ${{ steps.detect_outputs.outputs.run_autofix }}
      reason: ${{ steps.detect_outputs.outputs.reason }}
      no_caselaw_failures: ${{ steps.detect_outputs.outputs.no_caselaw_failures }}
      new_no_caselaw_failures: ${{ steps.detect_outputs.outputs.new_no_caselaw_failures }}
      report_path: ${{ steps.detect_outputs.outputs.report_path }}
      markdown_path: ${{ steps.detect_outputs.outputs.markdown_path }}
      report_filename: ${{ steps.detect_outputs.outputs.report_filename }}
      markdown_filename: ${{ steps.detect_outputs.outputs.markdown_filename }}
      telemetry_ok: ${{ steps.detect_outputs.outputs.telemetry_ok }}
      fetch_error: ${{ steps.detect_outputs.outputs.fetch_error }}
      previous_cursor_ts: ${{ steps.detect_outputs.outputs.previous_cursor_ts }}
      latest_event_ts: ${{ steps.detect_outputs.outputs.latest_event_ts }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Check required telemetry token
        id: token
        env:
          RETRIEVAL_HEALTH_TOKEN: ${{ secrets.RETRIEVAL_HEALTH_TOKEN }}
        run: |
          if [ -z "${RETRIEVAL_HEALTH_TOKEN}" ]; then
            echo "token_available=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing-token" >> "$GITHUB_OUTPUT"
          else
            echo "token_available=true" >> "$GITHUB_OUTPUT"
            echo "reason=ok" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect production no-case-law failures
        id: collect
        if: steps.token.outputs.token_available == 'true'
        env:
          RETRIEVAL_HEALTH_TOKEN: ${{ secrets.RETRIEVAL_HEALTH_TOKEN }}
          RETRIEVAL_HEALTH_BASE_URL: ${{ env.PROD_BASE_URL }}
          RETRIEVAL_HEALTH_BASE_URL_OVERRIDE: ${{ vars.RETRIEVAL_HEALTH_BASE_URL }}
          RETRIEVAL_HEALTH_FALLBACK_BASE_URLS_OVERRIDE: ${{ vars.RETRIEVAL_HEALTH_FALLBACK_BASE_URLS }}
        run: |
          BASE_URL="$RETRIEVAL_HEALTH_BASE_URL"
          if [ -n "${RETRIEVAL_HEALTH_BASE_URL_OVERRIDE:-}" ]; then
            BASE_URL="$RETRIEVAL_HEALTH_BASE_URL_OVERRIDE"
          fi
          if [ -n "${RETRIEVAL_HEALTH_FALLBACK_BASE_URLS_OVERRIDE:-}" ]; then
            export RETRIEVAL_HEALTH_FALLBACK_BASE_URLS="$RETRIEVAL_HEALTH_FALLBACK_BASE_URLS_OVERRIDE"
          fi
          node scripts/collect-production-no-caselaw.js \
            --base-url "$BASE_URL" \
            --limit 100 \
            --max-pages 8 \
            --out-dir reports/retrieval-autofix

      - name: Load previous cursor
        id: load_cursor
        if: steps.token.outputs.token_available == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PREVIOUS_CURSOR_TS=0
          ARTIFACT_ID=""

          ARTIFACT_JSON="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100")"

          ARTIFACT_ID="$(printf '%s' "$ARTIFACT_JSON" | python -c 'import json,sys; data=json.load(sys.stdin); items=[a for a in data.get("artifacts", []) if a.get("name")=="production-retrieval-cursor" and not a.get("expired")]; items.sort(key=lambda a:a.get("created_at",""), reverse=True); print(items[0]["id"] if items else "")')"

          if [ -n "$ARTIFACT_ID" ]; then
            mkdir -p .cursor-state
            curl -fsSL -L \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
              -o .cursor-state/cursor.zip
            unzip -q .cursor-state/cursor.zip -d .cursor-state
            CURSOR_FILE="$(find .cursor-state -type f -name 'cursor-state.json' | head -n 1 || true)"
            if [ -n "$CURSOR_FILE" ]; then
              PREVIOUS_CURSOR_TS="$(python -c 'import json,sys; p=sys.argv[1]; data=json.load(open(p)); ts=data.get("last_processed_ts",0); print(int(ts) if isinstance(ts,(int,float)) else 0)' "$CURSOR_FILE")"
            fi
          fi

          echo "previous_cursor_ts=$PREVIOUS_CURSOR_TS" >> "$GITHUB_OUTPUT"
          echo "cursor_artifact_id=$ARTIFACT_ID" >> "$GITHUB_OUTPUT"

      - name: Decide whether to tune
        id: precheck
        run: |
          set -euo pipefail
          if [ "${{ steps.token.outputs.token_available }}" != "true" ]; then
            echo "run_autofix=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing-token" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TELEMETRY_OK="false"
          FETCH_ERROR=""
          REPORT_PATH="${{ steps.collect.outputs.report_path }}"
          if [ -n "$REPORT_PATH" ] && [ -f "$REPORT_PATH" ]; then
            TELEMETRY_OK=$(node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(report.fetchError ? 'false' : 'true');" "$REPORT_PATH")
            FETCH_ERROR=$(node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); process.stdout.write(String(report.fetchError || ''));" "$REPORT_PATH")
          fi
          echo "telemetry_ok=$TELEMETRY_OK" >> "$GITHUB_OUTPUT"
          echo "fetch_error=$FETCH_ERROR" >> "$GITHUB_OUTPUT"

          FAILURES="${{ steps.collect.outputs.no_caselaw_failures }}"
          if [ -z "$FAILURES" ]; then FAILURES=0; fi
          NEW_FAILURES=0
          LATEST_EVENT_TS="${{ steps.load_cursor.outputs.previous_cursor_ts }}"
          if [ -z "$LATEST_EVENT_TS" ]; then LATEST_EVENT_TS=0; fi
          PREVIOUS_CURSOR_TS="${{ steps.load_cursor.outputs.previous_cursor_ts }}"
          if [ -z "$PREVIOUS_CURSOR_TS" ]; then PREVIOUS_CURSOR_TS=0; fi

          REPORT_PATH="${{ steps.collect.outputs.report_path }}"
          if [ -n "$REPORT_PATH" ] && [ -f "$REPORT_PATH" ]; then
            PARSED="$(node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync(process.argv[1],'utf8')); const cursor=Number(process.argv[2]||0); const events=Array.isArray(report.events)?report.events:[]; let latest=cursor; let fresh=0; for (const e of events) { const ts=Date.parse(e.ts||''); if (!Number.isFinite(ts)) continue; if (ts>latest) latest=ts; if (ts>cursor) fresh += 1; } process.stdout.write(JSON.stringify({fresh, latest}));" "$REPORT_PATH" "$PREVIOUS_CURSOR_TS")"
            NEW_FAILURES="$(printf '%s' "$PARSED" | python -c 'import json,sys; print(int(json.load(sys.stdin).get("fresh",0)))')"
            LATEST_EVENT_TS="$(printf '%s' "$PARSED" | python -c 'import json,sys; print(int(json.load(sys.stdin).get("latest",0)))')"
          fi
          echo "new_no_caselaw_failures=$NEW_FAILURES" >> "$GITHUB_OUTPUT"
          echo "latest_event_ts=$LATEST_EVENT_TS" >> "$GITHUB_OUTPUT"
          echo "previous_cursor_ts=$PREVIOUS_CURSOR_TS" >> "$GITHUB_OUTPUT"

          if [ "${FORCE_RUN}" = "true" ]; then
            echo "run_autofix=true" >> "$GITHUB_OUTPUT"
            echo "reason=forced" >> "$GITHUB_OUTPUT"
          elif [ "$TELEMETRY_OK" != "true" ]; then
            echo "run_autofix=false" >> "$GITHUB_OUTPUT"
            echo "reason=telemetry-unavailable" >> "$GITHUB_OUTPUT"
          elif [ "$NEW_FAILURES" -ge "$MIN_FAILURE_EVENTS" ]; then
            echo "run_autofix=true" >> "$GITHUB_OUTPUT"
            echo "reason=new-threshold-met" >> "$GITHUB_OUTPUT"
          else
            echo "run_autofix=false" >> "$GITHUB_OUTPUT"
            echo "reason=below-new-threshold" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish detector outputs
        id: detect_outputs
        run: |
          set -euo pipefail
          NO_CASELAW_FAILURES="${{ steps.collect.outputs.no_caselaw_failures }}"
          NEW_NO_CASELAW_FAILURES="${{ steps.precheck.outputs.new_no_caselaw_failures }}"
          REPORT_PATH="${{ steps.collect.outputs.report_path }}"
          MARKDOWN_PATH="${{ steps.collect.outputs.markdown_path }}"
          REPORT_FILENAME=""
          MARKDOWN_FILENAME=""
          if [ -z "$NO_CASELAW_FAILURES" ]; then NO_CASELAW_FAILURES=0; fi
          if [ -z "$NEW_NO_CASELAW_FAILURES" ]; then NEW_NO_CASELAW_FAILURES=0; fi
          if [ -n "$REPORT_PATH" ]; then REPORT_FILENAME="$(basename "$REPORT_PATH")"; fi
          if [ -n "$MARKDOWN_PATH" ]; then MARKDOWN_FILENAME="$(basename "$MARKDOWN_PATH")"; fi

          echo "run_autofix=${{ steps.precheck.outputs.run_autofix }}" >> "$GITHUB_OUTPUT"
          echo "reason=${{ steps.precheck.outputs.reason }}" >> "$GITHUB_OUTPUT"
          echo "no_caselaw_failures=${NO_CASELAW_FAILURES}" >> "$GITHUB_OUTPUT"
          echo "new_no_caselaw_failures=${NEW_NO_CASELAW_FAILURES}" >> "$GITHUB_OUTPUT"
          echo "report_path=${REPORT_PATH}" >> "$GITHUB_OUTPUT"
          echo "markdown_path=${MARKDOWN_PATH}" >> "$GITHUB_OUTPUT"
          echo "report_filename=${REPORT_FILENAME}" >> "$GITHUB_OUTPUT"
          echo "markdown_filename=${MARKDOWN_FILENAME}" >> "$GITHUB_OUTPUT"
          echo "telemetry_ok=${{ steps.precheck.outputs.telemetry_ok }}" >> "$GITHUB_OUTPUT"
          echo "fetch_error=${{ steps.precheck.outputs.fetch_error }}" >> "$GITHUB_OUTPUT"
          echo "previous_cursor_ts=${{ steps.precheck.outputs.previous_cursor_ts }}" >> "$GITHUB_OUTPUT"
          echo "latest_event_ts=${{ steps.precheck.outputs.latest_event_ts }}" >> "$GITHUB_OUTPUT"

      - name: Write daily detector summary
        run: |
          set -euo pipefail
          mkdir -p reports/retrieval-autofix
          cat > reports/retrieval-autofix/detector-summary.md << 'EOF'
          # Daily Retrieval Detector Summary

          - Run autofix: ${{ steps.precheck.outputs.run_autofix }}
          - Reason: ${{ steps.precheck.outputs.reason }}
          - Telemetry available: ${{ steps.precheck.outputs.telemetry_ok }}
          - No-case-law failures (current window): ${{ steps.detect_outputs.outputs.no_caselaw_failures }}
          - No-case-law failures (new since cursor): ${{ steps.detect_outputs.outputs.new_no_caselaw_failures }}
          - Previous cursor ts: ${{ steps.detect_outputs.outputs.previous_cursor_ts || '0' }}
          - Latest event ts: ${{ steps.detect_outputs.outputs.latest_event_ts || '0' }}
          - Report path: ${{ steps.detect_outputs.outputs.report_path || '(none)' }}
          - Markdown path: ${{ steps.detect_outputs.outputs.markdown_path || '(none)' }}
          - Fetch error: ${{ steps.precheck.outputs.fetch_error || '(none)' }}
          EOF

      - name: Upload detector artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-retrieval-detector-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            reports/retrieval-autofix/detector-summary.md
            reports/retrieval-autofix/*.json
            reports/retrieval-autofix/*.md

  repair:
    needs: detect
    if: needs.detect.outputs.run_autofix == 'true'
    runs-on: ubuntu-latest
    env:
      MIN_FAILURE_EVENTS: "10"
      HIGH_SIGNAL_FAILURE_EVENTS: "75"
      ALLOW_CLAUDE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_claude || 'false' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download detector artifacts
        uses: actions/download-artifact@v8
        with:
          name: production-retrieval-detector-${{ github.run_id }}
          path: reports/retrieval-autofix

      - name: Verify detector handoff payload
        id: detector_handoff
        run: |
          set -euo pipefail
          REPORT_FILE="${{ needs.detect.outputs.report_filename }}"
          if [ -z "$REPORT_FILE" ]; then
            echo "Missing report filename from detect job outputs."
            exit 1
          fi
          REPORT_PATH="reports/retrieval-autofix/$REPORT_FILE"
          if [ ! -f "$REPORT_PATH" ]; then
            echo "Detector report not found at $REPORT_PATH"
            echo "Downloaded files:"
            find reports/retrieval-autofix -maxdepth 2 -type f | sort || true
            exit 1
          fi
          REPORT_FAILURES=$(node -e "const fs=require('fs'); const p=process.argv[1]; const json=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(String(Number(json.noCaselawFailures||0))); " "$REPORT_PATH")
          EXPECTED_FAILURES="${{ needs.detect.outputs.no_caselaw_failures }}"
          if [ "$REPORT_FAILURES" != "$EXPECTED_FAILURES" ]; then
            echo "Detector handoff mismatch: report has $REPORT_FAILURES but detect output says $EXPECTED_FAILURES"
            exit 1
          fi
          echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
          echo "Report handoff verified at $REPORT_PATH with $REPORT_FAILURES no-case-law failures."

      - name: Create branch
        id: branch
        run: |
          set -euo pipefail
          BRANCH="retrieval-autofix/$(date +%Y-%m-%d)-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Apply deterministic retrieval autofix
        id: deterministic
        run: |
          set -euo pipefail
          REPORT_PATH="${{ steps.detector_handoff.outputs.report_path }}"
          node scripts/apply-retrieval-autofix.js \
            --apply \
            --min-failures "$MIN_FAILURE_EVENTS" \
            --report "$REPORT_PATH" \
            --summary reports/retrieval-autofix/autofix-plan.md

      - name: Verify deterministic patch
        id: deterministic_tests
        if: steps.deterministic.outputs.changed == 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:retrieval-failures 2>&1 | tee retrieval-autofix-tests.log

      - name: Optional Claude fallback (manual + high-signal only)
        id: claude
        if: steps.deterministic.outputs.changed != 'true' && env.ALLOW_CLAUDE == 'true' && fromJSON(needs.detect.outputs.no_caselaw_failures || '0') >= fromJSON(env.HIGH_SIGNAL_FAILURE_EVENTS)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "Claude key missing; skipping fallback."
            exit 0
          fi
          npm install -g @anthropic-ai/claude-code
          claude -p "$(cat .github/agents/production-retrieval-autofix.agent.md)" \
            --allowedTools "Read,Edit,Grep,Glob" \
            --max-turns 10 \
            --output-format text 2>&1 | tee retrieval-autofix-claude.log

      - name: Verify Claude patch
        id: claude_tests
        if: steps.claude.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:retrieval-failures 2>&1 | tee retrieval-autofix-tests-claude.log

      - name: Decide PR readiness
        id: readiness
        run: |
          set -euo pipefail
          READY=false
          SOURCE=none

          if [ "${{ steps.deterministic.outputs.changed }}" = "true" ] && [ "${{ steps.deterministic_tests.outcome }}" = "success" ]; then
            READY=true
            SOURCE=deterministic
          elif [ "${{ steps.claude.outcome }}" = "success" ] && [ "${{ steps.claude_tests.outcome }}" = "success" ]; then
            if ! git diff --quiet; then
              READY=true
              SOURCE=claude
            fi
          fi

          if git diff --quiet; then
            HAS_DIFF=false
          else
            HAS_DIFF=true
          fi

          echo "ready=${READY}" >> "$GITHUB_OUTPUT"
          echo "source=${SOURCE}" >> "$GITHUB_OUTPUT"
          echo "has_diff=${HAS_DIFF}" >> "$GITHUB_OUTPUT"

      - name: Upload autofix artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-retrieval-autofix-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            reports/retrieval-autofix/*.json
            reports/retrieval-autofix/*.md
            retrieval-autofix-tests.log
            retrieval-autofix-tests-claude.log
            retrieval-autofix-claude.log

      - name: Commit and push autofix branch
        if: steps.readiness.outputs.ready == 'true' && steps.readiness.outputs.has_diff == 'true'
        env:
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/_filterConfig.js reports/retrieval-autofix scripts/apply-retrieval-autofix.js scripts/collect-production-no-caselaw.js
          git commit -m "fix(retrieval): daily no-case-law autofix $(date +%Y-%m-%d)"
          git push origin "$BRANCH"

      - name: Open batched PR
        if: steps.readiness.outputs.ready == 'true' && steps.readiness.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          SOURCE: ${{ steps.readiness.outputs.source }}
          FAILURES: ${{ needs.detect.outputs.no_caselaw_failures }}
        run: |
          set -euo pipefail
          REPORT_MD="reports/retrieval-autofix/${{ needs.detect.outputs.markdown_filename }}"
          if [ -z "${{ needs.detect.outputs.markdown_filename }}" ] || [ ! -f "$REPORT_MD" ]; then
            echo "Missing markdown report for PR body."
            exit 1
          fi
          PLAN_MD="reports/retrieval-autofix/autofix-plan.md"
          BODY="$(cat "$REPORT_MD")\n\n---\n\n$(cat "$PLAN_MD")\n\n---\n\nSource: $SOURCE\nNo-case-law failures: $FAILURES"
          gh pr create \
            --title "fix(retrieval): daily production no-case-law autofix $(date +%Y-%m-%d)" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH"

  skip-summary:
    needs: detect
    if: needs.detect.outputs.run_autofix != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip summary
        run: |
          echo "Skipping daily retrieval autofix."
          echo "Reason: ${{ needs.detect.outputs.reason }}"
          echo "Telemetry available: ${{ needs.detect.outputs.telemetry_ok }}"
          echo "No-case-law failures (current window): ${{ needs.detect.outputs.no_caselaw_failures }}"
          echo "No-case-law failures (new since cursor): ${{ needs.detect.outputs.new_no_caselaw_failures }}"
          echo "Previous cursor ts: ${{ needs.detect.outputs.previous_cursor_ts }}"
          echo "Latest event ts: ${{ needs.detect.outputs.latest_event_ts }}"
          echo "Fetch error: ${{ needs.detect.outputs.fetch_error }}"

  persist-cursor:
    needs: [detect, repair]
    if: needs.detect.outputs.run_autofix == 'true' && needs.repair.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Write cursor state
        run: |
          set -euo pipefail
          mkdir -p reports/retrieval-autofix
          LAST_PROCESSED_TS="${{ needs.detect.outputs.latest_event_ts }}"
          if [ -z "$LAST_PROCESSED_TS" ]; then
            LAST_PROCESSED_TS="${{ needs.detect.outputs.previous_cursor_ts }}"
          fi
          if [ -z "$LAST_PROCESSED_TS" ]; then
            LAST_PROCESSED_TS=0
          fi
          python -c "import json,os; from datetime import datetime, timezone; out={'last_processed_ts': int(os.environ.get('LAST_PROCESSED_TS','0')), 'last_processed_at': datetime.now(timezone.utc).isoformat(), 'run_id': os.environ.get('GITHUB_RUN_ID'), 'no_caselaw_failures': int(os.environ.get('NO_CASELAW_FAILURES','0')), 'new_no_caselaw_failures': int(os.environ.get('NEW_NO_CASELAW_FAILURES','0'))}; open('reports/retrieval-autofix/cursor-state.json','w').write(json.dumps(out, indent=2) + '\n')"
        env:
          LAST_PROCESSED_TS: ${{ needs.detect.outputs.latest_event_ts }}
          NO_CASELAW_FAILURES: ${{ needs.detect.outputs.no_caselaw_failures }}
          NEW_NO_CASELAW_FAILURES: ${{ needs.detect.outputs.new_no_caselaw_failures }}

      - name: Upload cursor artifact
        uses: actions/upload-artifact@v7
        with:
          name: production-retrieval-cursor
          if-no-files-found: error
          retention-days: 30
          path: reports/retrieval-autofix/cursor-state.json
