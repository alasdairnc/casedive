name: Quality Guardrails

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  sanitizer-and-filter-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run sanitizer and retrieval guardrails
        run: npm run test:guardrails

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check
