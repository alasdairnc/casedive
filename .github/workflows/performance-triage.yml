name: Performance Triage

on:
  workflow_run:
    workflows: [Performance Monitor]
    types:
      - completed

permissions:
  contents: read
  issues: write

jobs:
  create-triage-issue:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Fetch monitor payload
        id: monitor
        env:
          RETRIEVAL_HEALTH_TOKEN: ${{ secrets.RETRIEVAL_HEALTH_TOKEN }}
          PERF_HEALTH_URL: ${{ vars.PERF_HEALTH_URL }}
          PERF_MONITOR_OUTPUT: json
        run: |
          set +e
          node scripts/performance-monitor.js > perf-monitor.json
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          cat perf-monitor.json
          set -e

      - name: Skip non-quality failures
        if: ${{ steps.monitor.outputs.exit_code != '1' }}
        run: |
          echo "Skipping scenario triage issue creation."
          echo "performance-monitor exit code: ${{ steps.monitor.outputs.exit_code }}"
          echo "Only exit code 1 (quality threshold breach) opens no-caselaw triage issues."

      - name: Create triage issue
        id: create_issue
        if: ${{ steps.monitor.outputs.exit_code == '1' }}
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const fs = require('fs');
            const payload = JSON.parse(fs.readFileSync('perf-monitor.json', 'utf8'));
            const failures = Array.isArray(payload.recentFailures) ? payload.recentFailures : [];
            const topFailures = failures.slice(0, 5);
            const improvements = Array.isArray(payload.improvements) ? payload.improvements.slice(0, 5) : [];
            const topImprovement = improvements[0] || null;
            const autofixClass = topImprovement?.classId || 'general_criminal';
            const issueTitle = topImprovement
              ? `Retrieval autofix: ${autofixClass} (${payload.oneHour?.noVerifiedRate ?? 'n/a'} no-verified)`
              : `Retrieval health regression detected (${payload.oneHour?.noVerifiedRate ?? 'n/a'} no-verified)`;

            const issueBody = [
              'Automated retrieval-health triage',
              '',
              `Workflow run: ${context.payload.workflow_run.html_url}`,
              `Conclusion: ${context.payload.workflow_run.conclusion}`,
              `Generated at: ${payload.generatedAt || 'n/a'}`,
              '',
              'Current snapshot:',
              `- errorRate: ${payload.oneHour?.errorRate ?? 'n/a'}`,
              `- noVerifiedRate: ${payload.oneHour?.noVerifiedRate ?? 'n/a'}`,
              `- fallbackRate: ${payload.oneHour?.fallbackRate ?? 'n/a'}`,
              `- avgRelevance: ${payload.oneHour?.avgRelevance ?? 'n/a'}`,
              `- p95LatencyMs: ${payload.oneHour?.p95LatencyMs ?? 'n/a'}`,
              '',
              `Autofix target: ${autofixClass}`,
              topImprovement ? `Failure count: ${topImprovement.failureCount || 0}` : 'Failure count: n/a',
              topImprovement
                ? `Suggested terms: ${(topImprovement.suggestedTerms || []).slice(0, 6).join(' | ') || 'none'}`
                : 'Suggested terms: none',
              '',
              'Top failed scenarios:',
              ...topFailures.map(
                (failure) =>
                  `- ${failure.ts || 'n/a'} | ${failure.endpoint || 'unknown'} | ${failure.reason || 'unknown'} | ${failure.scenarioSnippet || '(missing scenario)'} `
              ),
              '',
              'Recommended fix path:',
              '- Start in api/_caseLawRetrieval.js if the query needs broader search terms or better fallback ordering.',
              '- Update api/_retrievalImprovements.js if the scenario class needs better classification or term hints.',
              '- Keep analyze latency flat; do not add a second network hop unless it is narrowly scoped.',
              '- Add or update regression tests in tests/unit/retrievalImprovements.test.js and any touched retrieval tests.',
              '',
              'Relevant files:',
              '- api/_caseLawRetrieval.js',
              '- api/_retrievalImprovements.js',
              '- api/analyze.js',
              '- api/retrieve-caselaw.js',
              '- tests/unit/retrievalImprovements.test.js',
              '',
              'Specialized agent to use: CaseDive Retrieval Health (.github/agents/retrieval-health.agent.md)',
              '',
              'Agent prompt:',
              'Investigate and fix no-case-law retrieval failures for the listed scenario class. Prioritize the smallest safe patch that improves verified case-law return rate without regressing latency, add or update tests that fail before the patch and pass after, and report the monitor metric change after validation.',
            ].join('\n');

            const labels = ['retrieval-health', 'performance', 'triage', 'autofix'];
            const search = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: labels.join(','),
              per_page: 100,
            });

            const existing = search.data.find((issue) => issue.title === issueTitle);
            let issue;

            if (existing) {
              issue = await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title: issueTitle,
                body: issueBody,
                labels,
              });
            } else {
              issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels,
              });
            }

            return String(issue.data.number);

      - name: Assign Copilot
        id: assign_copilot
        if: ${{ steps.monitor.outputs.exit_code == '1' }}
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.create_issue.outputs.result }}
        run: |
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "Missing issue number"
            exit 1
          fi
          if ! gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-assignee "@copilot"; then
            echo "Copilot assignment unavailable; leaving triage issue unassigned."
          fi
